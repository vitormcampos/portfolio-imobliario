<header class="template02-header" [class.template02-header--scrolled]="isScrolled">
  <!-- Top bar -->
  <div class="template02-header-top">
    <div class="container template02-header-top-inner">
      <div class="template02-header-contacts">
        <a [href]="'tel:' + site.telefone" [attr.aria-label]="'Ligar para ' + site.telefone">
          <i data-feather="phone" aria-hidden="true"></i>
          {{ site.telefone }}
        </a>
        <a [href]="'tel:' + site.celular" [attr.aria-label]="'Ligar para ' + site.celular">
          <i data-feather="smartphone" aria-hidden="true"></i>
          {{ site.celular }}
        </a>
        <a [href]="'mailto:' + site.email" aria-label="Enviar email">
          <i data-feather="mail" aria-hidden="true"></i>
          {{ site.email }}
        </a>
      </div>
      <div class="template02-header-lang">
        <span>PT</span>
      </div>
    </div>
  </div>

  <!-- Main bar -->
  <div class="template02-header-main">
    <div class="container template02-header-main-inner">
      <a routerLink="/template-02" class="template02-logo" [attr.aria-label]="site.nome + ' — Página inicial'">
        <img
          [src]="site.logo"
          [alt]="site.nome + ' - Logo'"
          class="template02-logo-img"
          (error)="onLogoError($event)"
        />
      </a>

      <nav class="template02-nav-desktop" aria-label="Navegação principal">
        <a
          routerLink="/template-02"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{exact: true}"
        >Início</a>
        <a
          routerLink="/template-02/imoveis"
          routerLinkActive="active"
        >Imóveis</a>
        <a
          routerLink="/template-02/contato"
          routerLinkActive="active"
        >Contato</a>
      </nav>
    </div>
  </div>
</header>

<!-- Mobile bottom nav bar -->
<nav class="template02-nav-bottom" aria-label="Navegação mobile inferior">
  <ul>
    <li>
      <a routerLink="/template-02" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <i data-feather="home" aria-hidden="true"></i>
        <span>Início</span>
      </a>
    </li>
    <li>
      <a routerLink="/template-02/imoveis" routerLinkActive="active">
        <i data-feather="grid" aria-hidden="true"></i>
        <span>Imóveis</span>
      </a>
    </li>
    <li>
      <a routerLink="/template-02/contato" routerLinkActive="active">
        <i data-feather="phone" aria-hidden="true"></i>
        <span>Contato</span>
      </a>
    </li>
  </ul>
</nav>
