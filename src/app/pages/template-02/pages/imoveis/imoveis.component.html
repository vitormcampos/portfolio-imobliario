<app-template02-header />
<main id="main-content">
  <!-- Hero -->
  <section class="template02-hero" style="min-height: 250px;">
    <div class="template02-hero-bg" style="background-image: url('https://images.unsplash.com/photo-1600585154526-990dced4db0d?w=1920&q=80');" role="img" aria-label="Interior moderno"></div>
    <div class="template02-hero-content">
      <h1>Encontre seu imóvel ideal</h1>
      <p>De apartamentos a terrenos, temos a opção perfeita para você</p>
    </div>
  </section>

  <!-- Filters + Grid -->
  <section class="template02-section">
    <div class="container">
      <!-- Filter Bar -->
      <div class="template02-filter-bar" style="margin-top: 0; margin-bottom: 32px;">
        <div class="template02-filter-grid" style="grid-template-columns: repeat(6, 1fr);">
          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">Finalidade</label>
            <div class="select-wrapper">
              <select class="form-control" [(ngModel)]="filters.finalidade" (change)="onFilter()">
                <option value="">Todos</option>
                <option value="venda">Venda</option>
                <option value="aluguel">Aluguel</option>
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">Tipo</label>
            <div class="select-wrapper">
              <select class="form-control" [(ngModel)]="filters.tipo" (change)="onFilter()">
                <option value="">Todos</option>
                <option value="apartamento">Apartamento</option>
                <option value="casa">Casa</option>
                <option value="terreno">Terreno</option>
                <option value="comercial">Comercial</option>
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">Bairro</label>
            <div class="select-wrapper">
              <select class="form-control" [(ngModel)]="filters.bairro" (change)="onFilter()">
                <option value="">Todos</option>
                <option *ngFor="let bairro of bairros" [value]="bairro">{{ bairro }}</option>
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">Quartos</label>
            <div class="select-wrapper">
              <select class="form-control" [(ngModel)]="filters.quartos" (change)="onFilter()">
                <option value="">Qualquer</option>
                <option value="1">1+</option>
                <option value="2">2+</option>
                <option value="3">3+</option>
                <option value="4">4+</option>
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">Vagas</label>
            <div class="select-wrapper">
              <select class="form-control" [(ngModel)]="filters.vagas" (change)="onFilter()">
                <option value="">Qualquer</option>
                <option value="1">1+</option>
                <option value="2">2+</option>
                <option value="3">3+</option>
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">&nbsp;</label>
            <button class="btn btn-ghost" style="width: 100%;" (click)="clearFilters()">Limpar Filtros</button>
          </div>
        </div>
      </div>

      <!-- Results count -->
      <p style="font-size: 14px; color: #666666; margin-bottom: 24px;">
        Mostrando <strong>{{ filteredImoveis.length }}</strong> imóveis encontrados
      </p>

      <!-- Grid -->
      <div class="template02-properties-grid uk-grid-match uk-child-width-1-3@l uk-child-width-1-2@m uk-child-width-1-1" uk-grid uk-height-match=".template02-card" *ngIf="filteredImoveis.length > 0; else noResults">
        <div
          *ngFor="let imovel of filteredImoveis; let i = index"
          appReveal
          [appRevealDelay]="100 * (i % 6)"
        >
          <app-template02-property-card [imovel]="imovel" />
        </div>
      </div>

      <ng-template #noResults>
        <div class="text-center" style="padding: 48px 0; color: #666666;">
          <i data-feather="search" style="width: 48px; height: 48px; margin-bottom: 16px;" aria-hidden="true"></i>
          <p style="font-size: 18px;">Nenhum imóvel encontrado com os filtros selecionados.</p>
          <button class="btn btn-ghost mt-6" (click)="clearFilters()">Limpar Filtros</button>
        </div>
      </ng-template>

      <!-- Pagination (visual only) -->
      <nav class="template02-pagination" aria-label="Paginação de imóveis">
        <a href="#" class="active" aria-current="page">1</a>
        <a href="#">2</a>
        <a href="#">3</a>
      </nav>
    </div>
  </section>
</main>

<app-template02-footer />
<app-template02-whatsapp-button />
